<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 | ページが見つかりません | 株式会社SHiKiSAi</title>
    <meta name="robots" content="noindex" />
    <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Zen+Kaku+Gothic+New:wght@300;400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/base.css" />
    <style>
      body {
        background: var(--color-bg);
        color: var(--color-white);
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
      }

      .notfound {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: clamp(64px, 12vw, 120px) 24px;
        position: relative;
        overflow: hidden;
      }

      .notfound__bg {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(0, 195, 0, 0.025) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0, 195, 0, 0.025) 1px, transparent 1px);
        background-size: 56px 56px;
        pointer-events: none;
      }

      .notfound__glow {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 600px;
        height: 600px;
        background: radial-gradient(circle, rgba(0, 195, 0, 0.07) 0%, transparent 65%);
        pointer-events: none;
      }

      .notfound__num {
        font-family: "Inter", sans-serif;
        font-size: clamp(100px, 18vw, 200px);
        font-weight: 800;
        line-height: 1;
        letter-spacing: -0.06em;
        color: transparent;
        -webkit-text-stroke: 2px rgba(0, 195, 0, 0.4);
        position: relative;
        z-index: 1;
        user-select: none;
      }

      .notfound__title {
        font-size: clamp(20px, 3vw, 32px);
        font-weight: 700;
        letter-spacing: -0.02em;
        margin: 24px 0 16px;
        position: relative;
        z-index: 1;
        text-wrap: balance;
      }

      .notfound__desc {
        font-size: 15px;
        line-height: 1.8;
        color: rgba(255, 255, 255, 0.55);
        max-width: 400px;
        margin: 0 auto 48px;
        position: relative;
        z-index: 1;
        text-wrap: pretty;
      }

      .notfound__actions {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
        justify-content: center;
        position: relative;
        z-index: 1;
      }

      .btn-home {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 14px 28px;
        background: var(--color-accent);
        color: #fff;
        font-weight: 700;
        font-size: 15px;
        letter-spacing: 0.04em;
        border-radius: var(--radius-sm);
        text-decoration: none;
        transition: background 0.22s ease, transform 0.18s ease;
        cursor: pointer;
      }

      .btn-home:hover {
        background: var(--color-accent-deep);
        transform: translateY(-2px);
      }

      .btn-back {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 14px 28px;
        background: transparent;
        color: rgba(255, 255, 255, 0.6);
        font-weight: 600;
        font-size: 15px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: var(--radius-sm);
        text-decoration: none;
        transition: color 0.22s ease, border-color 0.22s ease;
        cursor: pointer;
      }

      .btn-back:hover {
        color: #fff;
        border-color: rgba(255, 255, 255, 0.35);
      }

      .notfound__nav {
        display: flex;
        gap: clamp(16px, 3vw, 40px);
        flex-wrap: wrap;
        justify-content: center;
        margin-top: 64px;
        position: relative;
        z-index: 1;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        padding-top: 40px;
      }

      .notfound__nav a {
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.4);
        text-decoration: none;
        transition: color 0.2s ease;
      }

      .notfound__nav a:hover {
        color: var(--color-accent);
      }

      .notfound__logo {
        position: relative;
        z-index: 1;
        margin-bottom: 40px;
      }

      .notfound__logo a {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        text-decoration: none;
        color: #fff;
        font-weight: 800;
        font-size: 18px;
        letter-spacing: 0.04em;
      }

      .notfound__logo img {
        height: 32px;
        width: auto;
      }
    </style>
  </head>
  <body>
    <main class="notfound">
      <div class="notfound__bg" aria-hidden="true"></div>
      <div class="notfound__glow" aria-hidden="true"></div>

      <div class="notfound__logo">
        <a href="index.html">
          <img src="assets/img/logo.png" alt="SHiKiSAi" />
          <span>SHiKiSAi</span>
        </a>
      </div>

      <p class="notfound__num" aria-hidden="true">404</p>

      <h1 class="notfound__title">ページが見つかりません</h1>
      <p class="notfound__desc">
        お探しのページは移動・削除されたか、URLが間違っている可能性があります。
      </p>

      <div class="notfound__actions">
        <a href="index.html" class="btn-home">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          トップへ戻る
        </a>
        <a href="contact.html" class="btn-back">お問い合わせ</a>
      </div>

      <nav class="notfound__nav" aria-label="サイトナビゲーション">
        <a href="news.html">News</a>
        <a href="about.html">About</a>
        <a href="service.html">Service</a>
        <a href="recruit.html">Recruit</a>
        <a href="contact.html">Contact</a>
      </nav>
    </main>
  </body>
</html>
